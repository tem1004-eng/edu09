<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>주일학교 출석부</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#56ab2f">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 레이아웃 및 폰트 */
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #app-container { width: 100%; max-width: 480px; background-color: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        
        /* 헤더 (상단 초록색 배경) */
        .header { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); padding: calc(30px + env(safe-area-inset-top)) 20px 25px; color: white; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 10px rgba(86, 171, 47, 0.2); }
        .header h2 { margin: 0; font-size: 1.5em; font-weight: 700; letter-spacing: -0.5px; }
        
        /* 날짜 버튼 (클릭 시 달력 나옴) */
        .current-date-display { margin-top: 12px; font-size: 1.1em; font-weight: 500; background: rgba(255,255,255,0.25); display: inline-block; padding: 6px 18px; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
        .current-date-display:active { background: rgba(255,255,255,0.4); }

        /* 소속 입력란 (터치 시 수정 가능) */
        .class-info { margin-top: 18px; font-size: 1.05em; font-weight: 500; color: white; line-height: 1.8; }
        .editable { display: inline-block; min-width: 40px; border-bottom: 1px dashed rgba(255,255,255,0.6); outline: none; font-weight: 700; padding: 0 2px; cursor: text; transition: background 0.2s, border 0.2s; }
        .editable:focus { background: rgba(255,255,255,0.2); border-bottom: 1px solid transparent; border-radius: 4px; }
        .editable:empty:before { content: attr(data-placeholder); color: rgba(255,255,255,0.6); font-weight: 400; }

        /* 리스트 영역 */
        .list-container { padding: 20px; padding-bottom: calc(100px + env(safe-area-inset-bottom)); flex-grow: 1; }
        .attendance-summary { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; color: #555; font-size: 0.9em; padding: 0 5px; }
        .student-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 16px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: transform 0.1s; }
        .student-card:active { transform: scale(0.98); }
        .student-info { flex: 1; display: flex; align-items: center; gap: 8px; }
        
        /* 이름 클릭 유도를 위한 밑줄과 화살표 표시 */
        .student-name { font-weight: 700; color: #1976D2; font-size: 1.15em; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; text-decoration-color: #bbdefb; }
        .student-name::after { content: ' ›'; font-size: 0.9em; color: #ccc; text-decoration: none; display: inline-block; }
        
        /* 출석/결석 뱃지 */
        .status-badge { font-size: 0.75em; padding: 4px 10px; border-radius: 8px; font-weight: 700; }
        .badge-present { background: #e8f5e9; color: #2e7d32; }
        .badge-absent { background: #ffebee; color: #c62828; }
        
        /* 체크박스 터치 영역 확대 */
        .quick-check { padding: 5px; }
        .quick-check input[type="checkbox"] { width: 28px; height: 28px; accent-color: #56ab2f; cursor: pointer; border-radius: 6px; }

        /* 플로팅 + 버튼 (스마트폰 하단 여백 고려) */
        .fab { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: 25px; width: 60px; height: 60px; background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: 300; box-shadow: 0 6px 16px rgba(252, 96, 118, 0.4); border: none; cursor: pointer; transition: transform 0.2s; z-index: 100; padding-bottom: 4px; }
        .fab:active { transform: scale(0.9); }

        /* 맨 아래 희미한 로고 텍스트 */
        .footer-logo { text-align: center; padding: 0 0 calc(30px + env(safe-area-inset-bottom)); font-size: 0.75em; color: #d0d0d0; font-weight: 500; letter-spacing: 1px; }

        /* 모달 (팝업창) 공통 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-title { font-weight: 700; margin-bottom: 20px; text-align: center; font-size: 1.2em; color: #333; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85em; color: #777; margin-bottom: 6px; font-weight: 500; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 1em; transition: border-color 0.2s; }
        .input-group input:focus { border-color: #56ab2f; outline: none; }
        
        /* 버튼 스타일 */
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1em; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #56ab2f; color: white; }
        .btn-secondary { background: #e0e0e0; color: #555; }
        .btn-danger { background: #ffebee; color: #c62828; width: 100%; margin-top: 10px; border: 1px solid #ffcdd2; }
        
        /* 달력 그리드 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; margin-bottom: 10px; }
        .calendar-day-head { font-weight: 700; font-size: 0.85em; color: #aaa; padding: 5px 0; }
        .calendar-day-head:first-child { color: #fc6076; } /* 일요일 빨간색 */
        .calendar-cell { padding: 12px 0; border-radius: 10px; cursor: pointer; font-size: 0.95em; font-weight: 500; color: #333; transition: background 0.2s; }
        .calendar-cell:active { background: #f0f0f0; }
        .calendar-cell.selected { background: #56ab2f; color: white; font-weight: 700; box-shadow: 0 4px 8px rgba(86, 171, 47, 0.3); }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h2>🌱 주일학교 출석부</h2>
        <div class="current-date-display" id="dateDisplay" onclick="openCalendar()">날짜 로딩중...</div>
        
        <div class="class-info">
            <span class="editable" id="churchName" contenteditable="true" data-placeholder="[무슨]"></span>교회 
            <span class="editable" id="deptName" contenteditable="true" data-placeholder="[무슨]"></span>부 
            <span class="editable" id="gradeNum" contenteditable="true" data-placeholder="[몇]"></span>학년 
            <span class="editable" id="classNum" contenteditable="true" data-placeholder="[몇]"></span>반
        </div>
    </div>

    <div class="list-container">
        <div class="attendance-summary" id="attendanceSummary">
            <span>참석인원: 0명</span>
            <span>결석인원: 0명</span>
        </div>
        <div id="studentList">
            </div>
    </div>

    <div class="footer-logo">Piltong AI ministry</div>

    <button class="fab" onclick="openAddModal()">+</button>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <div class="modal-title">새 학생 등록</div>
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="newName" placeholder="이름을 입력하세요">
        </div>
        <div class="input-group">
            <label>전화번호</label>
            <input type="tel" id="newPhone" placeholder="예: 010-1234-5678">
        </div>
        <div class="input-group">
            <label>생년월일</label>
            <input type="date" id="newBirth">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="addStudent()">등록하기</button>
            <button class="btn btn-secondary" onclick="closeModal('addModal')">취소</button>
        </div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-title">학생 정보 수정</div>
        <input type="hidden" id="editId">
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="editName" placeholder="이름을 입력하세요">
        </div>
        <div class="input-group">
            <label>전화번호</label>
            <input type="tel" id="editPhone" placeholder="예: 010-1234-5678">
        </div>
        <div class="input-group">
            <label>생년월일</label>
            <input type="date" id="editBirth">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="updateStudent()">수정하기</button>
            <button class="btn btn-secondary" onclick="closeModal('editModal')">닫기</button>
        </div>
        <button class="btn btn-danger" onclick="deleteStudent()">🗑 학생 정보 삭제</button>
    </div>
</div>

<div class="modal" id="calendarModal">
    <div class="modal-content">
        <div class="modal-title" id="calendarMonthTitle" style="margin-bottom: 5px;"></div>
        <div style="text-align: center; font-size: 0.85em; color: #777; margin-bottom: 20px;">출석을 확인할 날짜를 선택하세요</div>
        <div class="calendar-grid" id="calendarGrid">
            </div>
        <div class="btn-row">
            <button class="btn btn-secondary" style="width: 100%;" onclick="closeModal('calendarModal')">닫기</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 소속 정보 저장 및 로딩 로직
    // ==========================================
    function loadClassInfo() {
        const info = JSON.parse(localStorage.getItem('ss_classInfo'));
        if (info) {
            document.getElementById('churchName').innerText = info.church || '';
            document.getElementById('deptName').innerText = info.dept || '';
            document.getElementById('gradeNum').innerText = info.grade || '';
            document.getElementById('classNum').innerText = info.cls || '';
        }

        document.querySelectorAll('.editable').forEach(el => {
            el.addEventListener('blur', saveClassInfo);
            el.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
            });
        });
    }

    function saveClassInfo() {
        const info = {
            church: document.getElementById('churchName').innerText.trim(),
            dept: document.getElementById('deptName').innerText.trim(),
            grade: document.getElementById('gradeNum').innerText.trim(),
            cls: document.getElementById('classNum').innerText.trim()
        };
        localStorage.setItem('ss_classInfo', JSON.stringify(info));
    }


    // ==========================================
    // 2. 출석부 데이터 메인 로직
    // ==========================================
    let students = JSON.parse(localStorage.getItem('ss_students_v3')) || [];
    let attendance = JSON.parse(localStorage.getItem('ss_attendance_v3')) || {}; 
    
    // 한국 시간 기준으로 오늘 날짜 가져오기
    const todayKST = new Date(new Date().getTime() + (9 * 60 * 60 * 1000)); 
    let currentSelectedDate = todayKST.toISOString().split('T')[0];

    // 모달 제어 공통
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- 달력 관련 함수 ---
    function openCalendar() {
        document.getElementById('calendarModal').style.display = 'flex';
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const dayHeads = ['일', '월', '화', '수', '목', '금', '토'];
        dayHeads.forEach(d => grid.innerHTML += `<div class="calendar-day-head">${d}</div>`);

        const now = new Date(currentSelectedDate); 
        document.getElementById('calendarMonthTitle').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월`;
        const start = new Date(now.getFullYear(), now.getMonth(), 1);
        const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);

        for (let i = 0; i < start.getDay(); i++) grid.innerHTML += '<div></div>';

        for (let d = 1; d <= last.getDate(); d++) {
            const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = dateStr === currentSelectedDate;
            grid.innerHTML += `<div class="calendar-cell ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">${d}</div>`;
        }
    }

    function selectDate(dateStr) {
        currentSelectedDate = dateStr;
        const d = new Date(dateStr);
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        document.getElementById('dateDisplay').innerText = `${dateStr} (${week[d.getDay()]})`;
        closeModal('calendarModal');
        renderList();
    }

    // --- 학생 리스트 렌더링 ---
    function renderList() {
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = '';
        const dayData = attendance[currentSelectedDate] || {};
        
        let presentCount = 0;
        let absentCount = 0;

        if (students.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center; padding: 40px 0; color: #999; line-height: 1.6;">등록된 학생이 없습니다.<br>우측 하단의 <strong style="color:#ff9a44;">+ 버튼</strong>을 눌러<br>학생을 추가해주세요.</div>';
        }

        // 이름 기준 가나다순 정렬
        students.sort((a,b) => a.name.localeCompare(b.name, 'ko'));

        students.forEach((s) => {
            const isPresent = dayData[s.id] || false;
            isPresent ? presentCount++ : absentCount++;

            // 학생 이름에 클릭 이벤트를 추가하여 수정 모달창 연결
            listDiv.innerHTML += `
                <div class="student-card">
                    <div class="student-info">
                        <span class="student-name" onclick="openEditModal('${s.id}')">${s.name}</span>
                        <span class="status-badge ${isPresent ? 'badge-present' : 'badge-absent'}">${isPresent ? '출석' : '결석'}</span>
                    </div>
                    <div class="quick-check">
                        <input type="checkbox" ${isPresent ? 'checked' : ''} onchange="toggleAttendance('${s.id}')">
                    </div>
                </div>
            `;
        });

        document.getElementById('attendanceSummary').innerHTML = `<span>참석인원: ${presentCount}명</span> <span>결석인원: ${absentCount}명</span>`;
    }

    function toggleAttendance(id) {
        if (!attendance[currentSelectedDate]) attendance[currentSelectedDate] = {};
        attendance[currentSelectedDate][id] = !attendance[currentSelectedDate][id];
        localStorage.setItem('ss_attendance_v3', JSON.stringify(attendance));
        renderList();
    }

    // --- 새 학생 추가 기능 ---
    function openAddModal() { 
        document.getElementById('newName').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newBirth').value = '';
        document.getElementById('addModal').style.display = 'flex'; 
    }

    function addStudent() {
        const name = document.getElementById('newName').value.trim();
        const phone = document.getElementById('newPhone').value;
        const birth = document.getElementById('newBirth').value;
        if(!name) return alert('이름을 입력해주세요.');

        const newStudent = { id: Date.now().toString(), name, phone, birth };
        students.push(newStudent);
        localStorage.setItem('ss_students_v3', JSON.stringify(students));
        
        closeModal('addModal');
        renderList();
    }

    // --- 기존 학생 수정/삭제 기능 ---
    function openEditModal(id) {
        const s = students.find(x => x.id === id);
        if(!s) return;
        
        document.getElementById('editId').value = s.id;
        document.getElementById('editName').value = s.name;
        document.getElementById('editPhone').value = s.phone || '';
        document.getElementById('editBirth').value = s.birth || '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function updateStudent() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('editName').value.trim();
        if(!name) return alert('이름을 입력해주세요.');

        const idx = students.findIndex(x => x.id === id);
        if(idx > -1) {
            students[idx].name = name;
            students[idx].phone = document.getElementById('editPhone').value;
            students[idx].birth = document.getElementById('editBirth').value;
            localStorage.setItem('ss_students_v3', JSON.stringify(students));
            closeModal('editModal');
            renderList();
        }
    }

    function deleteStudent() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('editName').value;
        
        if(confirm(`'${name}' 학생을 목록에서 완전히 삭제하시겠습니까?\n(과거 출석 기록도 함께 삭제됩니다)`)) {
            // 학생 목록에서 삭제
            students = students.filter(x => x.id !== id);
            localStorage.setItem('ss_students_v3', JSON.stringify(students));
            
            // 출석 기록에서 해당 학생 삭제
            for(let date in attendance) {
                delete attendance[date][id];
            }
            localStorage.setItem('ss_attendance_v3', JSON.stringify(attendance));

            closeModal('editModal');
            renderList();
        }
    }

    // ==========================================
    // 3. 앱 실행 시 초기화
    // ==========================================
    window.onload = () => {
        loadClassInfo();
        selectDate(currentSelectedDate);
    };
</script>
</body>
</html>
